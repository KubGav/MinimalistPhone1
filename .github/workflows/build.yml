name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: The Hacker Kill Switch (Nuke JetBrains & Foojay)
      run: |
        find . -type f -name "*.kts" -exec sed -i 's/.*JETBRAINS.*//g' {} +
        find . -type f -name "*.kts" -exec sed -i 's/.*foojay.*//g' {} +
        find . -type f -name "*.kt" -exec sed -i 's/.*JETBRAINS.*//g' {} +
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew assembleDebug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: minimal-launcher-apk
        path: app/build/outputs/apk/debug/app-debug.apk
