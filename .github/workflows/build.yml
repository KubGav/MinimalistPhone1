name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Taktika spalene zeme v2 (Spravne poradi)
      run: |
        # 1. Zachranime tvuj kod do bezpeci
        mkdir -p /tmp/rescue
        find . -name "MainActivity.kt" -exec cp {} /tmp/rescue/ \;
        
        # 2. Smazeme z projektu UPLNE VSECHNO (krome skryte .github slozky)
        find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' -exec rm -rf {} +
        
        # 3. NEJDRIV VYTVORIME SOUBORY (aby Gradle nepanikaril)
        cat << 'EOF' > settings.gradle.kts
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "MinimalistLauncher"
        include(":app")
        EOF
        
        cat << 'EOF' > build.gradle.kts
        plugins {
            id("com.android.application") version "8.2.0" apply false
            id("org.jetbrains.kotlin.android") version "1.9.21" apply false
        }
        EOF
        
        mkdir -p app
        cat << 'EOF' > app/build.gradle.kts
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }
        android {
            namespace = "com.myapplication"
            compileSdk = 34
            defaultConfig {
                applicationId = "com.myapplication"
                minSdk = 26
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
            }
            buildFeatures { compose = true }
            composeOptions { kotlinCompilerExtensionVersion = "1.5.7" }
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            kotlinOptions { jvmTarget = "17" }
        }
        dependencies {
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.activity:activity-compose:1.8.2")
            implementation(platform("androidx.compose:compose-bom:2024.02.00"))
            implementation("androidx.compose.ui:ui")
            implementation("androidx.compose.material:material")
        }
        EOF
        
        mkdir -p app/src/main
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:tools="http://schemas.android.com/tools">
            <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" tools:ignore="QueryAllPackagesPermission" />
            <application
                android:allowBackup="true"
                android:label="MinimalistLauncher"
                android:supportsRtl="true"
                android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                <activity
                    android:exported="true"
                    android:name=".MainActivity"
                    android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                        <category android:name="android.intent.category.HOME" />
                        <category android:name="android.intent.category.DEFAULT" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        mkdir -p app/src/main/java/com/myapplication
        cp /tmp/rescue/MainActivity.kt app/src/main/java/com/myapplication/
        
        # 4. AZ TED muzeme nahodit Gradle, protoze uz vidi konfiguracy
        gradle wrapper --gradle-version 8.5
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew assembleDebug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: minimal-launcher-apk
        path: app/build/outputs/apk/debug/app-debug.apk
